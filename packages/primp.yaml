package: primp
repo: https://github.com/deedy5/primp
pypi_url: https://pypi.org/project/primp/
extension_type: extensions
python_versions: []
install_method: pip
install_command: pip install maturin && pip install -e crates/primp-python/ && pip install pytest pytest-asyncio
test_command: python -m pytest crates/primp-python/tests/ -m "not internet"
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions: {}
notes: 'Rust/maturin build; pyproject.toml is in crates/primp-python/, not repo root. Uses PyO3 0.28.2 which supports 3.15. Excludes internet-requiring tests via marker. asyncio_mode=auto requires pytest-asyncio.'
enriched: true
clone_depth: null
import_name: null
