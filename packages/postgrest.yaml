package: postgrest
repo: https://github.com/supabase/supabase-py
pypi_url: https://pypi.org/project/postgrest/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e src/postgrest && pip install pytest pytest-asyncio pytest-depends
test_command: python -m pytest src/postgrest/tests/ --ignore=src/postgrest/tests/_async/test_filter_request_builder_integration.py --ignore=src/postgrest/tests/_sync/test_filter_request_builder_integration.py
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions:
  '3.15': pydantic (core dep) requires pydantic-core which is PyO3 and does not build on 3.15
notes: 'supabase-py is a uv workspace monorepo; pip install -e . at repo root fails (no build-system). Must install from src/postgrest subfolder. Integration tests (test_filter_request_builder_integration.py) connect to localhost:3000 Docker PostgREST — exclude them. Unit tests use httpx mocks and work without Docker. asyncio_mode=auto in pyproject.toml means pytest-asyncio handles async tests. pydantic is a core dep (uses pydantic.TypeAdapter) which pulls pydantic-core (PyO3).'
enriched: true
clone_depth: null
import_name: null
