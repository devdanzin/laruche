notes: 'saxonche is the official Saxonica PyPI wheel for Saxon/C-HE (XSLT 3.0, XQuery 3.1). Tests live in the separate saxonc-resources repo. Original YAML had wrong repo (tennom/saxonpy is a different unrelated package).'
enriched: true
clone_depth: null
import_name: null
