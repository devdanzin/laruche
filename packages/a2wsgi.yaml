package: a2wsgi
repo: https://github.com/abersheeran/a2wsgi
pypi_url: https://pypi.org/project/a2wsgi/
extension_type: pure
python_versions:
- '3.15'
- '3.14'
install_method: pip
install_command: pip install -e . && pip install pytest pytest-asyncio httpx starlette baize
test_command: python -m pytest tests/ -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: null
skip: false
skip_reason: null
skip_versions: {}
notes: ASGI/WSGI conversion library. Uses PDM build with dev-dependencies (not [project.optional-dependencies]), so deps must be listed explicitly. Tests need httpx, starlette, baize, pytest-asyncio.
enriched: true
clone_depth: null
import_name: null
