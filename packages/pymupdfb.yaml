notes: 'Repo is pymupdf/pymupdf (binary companion wheel). conftest.py auto-installs fonttools/pymupdf-fonts/psutil/pillow. difflib is stdlib; gentle_compare is a local tests/ file. Unsupported on Python 3.15.'
