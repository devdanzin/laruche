package: checkov
repo: https://github.com/bridgecrewio/checkov
pypi_url: https://pypi.org/project/checkov/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest
test_command: python -m pytest tests/ -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions:
  '3.15': Depends on pydantic-core (PyO3)
notes: IaC security scanner. Heavy deps (pydantic>=2, rustworkx, boto3, docker). pydantic-core has cp314 wheels so testable on 3.14. rustworkx uses abi3 wheels (cp39+). Many tests may require external tools/infra.
enriched: true
clone_depth: null
import_name: null
