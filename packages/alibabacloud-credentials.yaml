package: alibabacloud-credentials
repo: https://github.com/aliyun/credentials-python
pypi_url: https://pypi.org/project/alibabacloud-credentials/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest alibabacloud-tea alibabacloud_credentials_api APScheduler aiofiles
test_command: python -m pytest tests/ -p no:xdist --ignore tests/test_integration.py
test_framework: pytest
uses_xdist: false
timeout: 120
skip: false
skip_reason: null
skip_versions: {}
notes: Alibaba Cloud credentials SDK. Has its own standalone repo (not a monorepo subpackage). Unit tests use mock HTTP servers, no real cloud credentials needed. test_integration.py requires real cloud credentials so it is excluded.
enriched: true
clone_depth: null
import_name: null
