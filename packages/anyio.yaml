package: anyio
repo: https://github.com/agronholm/anyio
pypi_url: https://pypi.org/project/anyio/
extension_type: pure
python_versions:
- '3.15'
- '3.14'
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest pytest-mock trustme
  pytest-mock trustme hypothesis psutil blockbuster exceptiongroup coverage
test_command: python -m pytest
test_framework: pytest
uses_xdist: false
timeout: null
skip: false
skip_reason: null
notes: "Uses setuptools-scm (needs git tags). Tests are heavily parametrized across async
  backends (asyncio, trio, uvloop). Custom anyio pytest plugin auto-loads via entry point."
enriched: true
