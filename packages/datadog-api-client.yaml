package: datadog-api-client
repo: https://github.com/DataDog/datadog-api-client-python
pypi_url: https://pypi.org/project/datadog-api-client/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest pytest-bdd pytest-recording pytest-asyncio
  pytest-randomly glom jinja2 python-dateutil aiosonic zstandard
test_command: python -m pytest tests/ --ignore=tests/v1 --ignore=tests/v2 -o "addopts="
test_framework: pytest
uses_xdist: false
timeout: 300
skip: false
skip_reason: null
skip_versions: {}
notes: "BDD tests (v1/v2) require cassettes and API keys, run only unit tests.
  conftest.py imports pytest-bdd, glom, jinja2, python-dateutil at top level so they
  must be installed even when skipping BDD tests."
enriched: true
clone_depth: null
import_name: null
