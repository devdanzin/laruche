package: aioboto3
repo: https://github.com/terricain/aioboto3
pypi_url: https://pypi.org/project/aioboto3/
extension_type: pure
python_versions:
- '3.14'
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest pytest-asyncio moto[server]
test_command: python -m pytest tests -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: null
skip: false
skip_reason: null
skip_versions:
  '3.15': moto[server] requires pydantic which requires pydantic-core (Rust/PyO3), no Python 3.15 wheels yet
notes: Uses setuptools-scm (needs git tags). Tests use ThreadedMotoServer from moto[server] to mock AWS APIs. moto[server] requires pydantic-core which blocks 3.15.
enriched: true
clone_depth: 50
import_name: null
