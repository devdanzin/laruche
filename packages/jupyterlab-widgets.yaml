notes: 'Monorepo: jupyterlab-widgets is in repo root, ipywidgets (with tests) is in python/ipywidgets/. Install ipywidgets package for tests. Test deps from setup.cfg [test] extras: jsonschema, ipykernel, pytz.'
enriched: true
clone_depth: null
import_name: null
