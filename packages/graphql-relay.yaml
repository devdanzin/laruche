package: graphql-relay
repo: https://github.com/graphql-python/graphql-relay-py
pypi_url: https://pypi.org/project/graphql-relay/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest pytest-asyncio pytest-describe graphql-core
test_command: python -m pytest tests -o "python_classes=PyTest*" -o "asyncio_mode=auto" -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: 300
skip: false
skip_reason: null
skip_versions: {}
notes: "Uses pytest-describe plugin for describe_* style tests (not standard test_*).
  setup.cfg sets python_classes=PyTest* to disable default class collection.
  Needs asyncio_mode=auto from setup.cfg. Uses poetry-core build backend."
enriched: true
clone_depth: null
import_name: null
