package: google-auth
repo: https://github.com/googleapis/google-auth-library-python
pypi_url: https://pypi.org/project/google-auth/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest pytest-cov pytest-asyncio mock pyopenssl
  responses cryptography requests pyu2f freezegun urllib3 flask grpcio pytest-localserver
  oauth2client pyjwt
test_command: python -m pytest tests/ -p no:xdist --ignore=tests/transport/aio
test_framework: pytest
uses_xdist: false
timeout: 300
skip: false
skip_reason: null
notes: 'Google auth library. Tests need flask (transport compliance), grpcio (transport
  tests), pytest-localserver (WSGIServer), oauth2client, pyjwt. Ignore tests/transport/aio.'
enriched: true
clone_depth: null
import_name: google.auth
