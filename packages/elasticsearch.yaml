package: elasticsearch
repo: https://github.com/elastic/elasticsearch-py
pypi_url: https://pypi.org/project/elasticsearch/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e ".[dev]" && pip install pytest pytest-mock pytest-asyncio pytest-cov
test_command: python -m pytest test_elasticsearch/ --ignore=test_elasticsearch/test_server --ignore=test_elasticsearch/test_dsl/test_integration -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions: {}
notes: Tests in test_elasticsearch/. test_server and test_dsl/test_integration need live Elasticsearch, skipped. test_client and top-level tests are unit tests.
enriched: true
clone_depth: null
import_name: null
