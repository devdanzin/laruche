package: altair
repo: https://github.com/vega/altair
pypi_url: https://pypi.org/project/altair/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest pytest-xdist pytest-cov narwhals
test_command: python -m pytest tests -p no:xdist -o "addopts="
test_framework: pytest
uses_xdist: true
timeout: null
skip: false
skip_reason: null
skip_versions:
  '3.15': "Runtime dep jsonschema>=4.18 pulls rpds-py (Rust/PyO3), won't build on 3.15 without Rust toolchain."
notes: xdist disabled for JIT testing. addopts uses --numprocesses=logical and --doctest-modules; cleared with -o "addopts=". jsonschema>=4.18 requires rpds-py (Rust extension) which blocks 3.15.
enriched: true
clone_depth: null
import_name: null
