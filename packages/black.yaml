package: black
repo: https://github.com/psf/black
pypi_url: https://pypi.org/project/black/
extension_type: extensions
python_versions: []
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest
  pytest-xdist ipynb click
test_command: python -m pytest tests/ -p no:xdist --ignore=tests/test_blackd.py -o
  "addopts="
test_framework: pytest
uses_xdist: true
timeout: 600
skip: false
skip_reason: null
skip_versions:
  '3.15': "pytokens dependency (mypyc compiled) has no cp315 wheel yet"
notes: "Code formatter. Uses hatch-vcs for versioning (needs git tags). Has optional
  C extension via mypyc (blib2to3), but installs in pure Python mode from source.
  Uses xdist, disabled for JIT. Large test suite. Depends on pytokens which is mypyc-compiled
  and needs a 3.15 wheel. pyproject.toml addopts has --strict-config --strict-markers,
  clear them."
enriched: true
clone_depth: null
import_name: null
