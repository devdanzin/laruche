package: pytensor
repo: https://github.com/pymc-devs/pytensor
pypi_url: https://pypi.org/project/pytensor/
extension_type: extensions
python_versions: []
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e ".[tests]"
test_command: python -m pytest tests/ -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions:
  '3.15': requires-python = ">=3.11,<3.15" — pip refuses to install on 3.15
notes: 'Uses versioneer (needs git fetch --tags). [tests] extra includes pytest-sphinx needed by --doctest-modules addopts. Main deps numpy/scipy/numba require C builds.'
enriched: true
clone_depth: null
import_name: null
