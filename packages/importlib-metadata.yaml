package: importlib-metadata
repo: https://github.com/python/importlib_metadata
pypi_url: https://pypi.org/project/importlib-metadata/
extension_type: pure
python_versions:
- '3.15'
- '3.14'
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e ".[test]"
test_command: python -m pytest tests/ -p no:xdist -o "addopts="
test_framework: pytest
uses_xdist: false
timeout: null
skip: false
skip_reason: null
notes: Uses setuptools with setuptools_scm (needs tags). Has --doctest-modules in pytest.ini, override addopts to avoid doctest issues.
enriched: true
