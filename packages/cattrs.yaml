package: cattrs
repo: https://github.com/python-attrs/cattrs
pypi_url: https://pypi.org/project/cattrs/
extension_type: pure
python_versions:
- '3.15'
- '3.14'
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest hypothesis
test_command: python -m pytest tests/ -p no:xdist -o "addopts=" --ignore=tests/test_preconf.py --ignore=tests/preconf --ignore=tests/test_cols.py --ignore=tests/test_unstructure_collections.py
test_framework: pytest
uses_xdist: true
timeout: 900
skip: false
skip_reason: null
skip_versions: {}
notes: "Class converter/serialization library. Uses hatch-vcs for versioning (needs
  git tags). addopts has benchmark flags, clear them. Some test files require optional
  deps (immutables, bson, msgspec, pyyaml) that may not build on 3.15 - ignored.
  All deps are pure Python (attrs, typing-extensions, hypothesis) so install errors
  are likely transient."
enriched: true
clone_depth: 50
import_name: null
