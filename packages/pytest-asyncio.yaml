package: pytest-asyncio
repo: https://github.com/pytest-dev/pytest-asyncio
pypi_url: https://pypi.org/project/pytest-asyncio/
extension_type: pure
python_versions: []
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest hypothesis
test_command: python -m pytest tests/ -p no:xdist -o "addopts="
test_framework: pytest
uses_xdist: false
timeout: null
skip: false
skip_reason: null
notes: Uses setuptools-scm (needs git tags). addopts cleared (has -rsx --tb=short). testpaths includes docs/ but we target tests/ only.
enriched: true
clone_depth: 50
import_name: pytest_asyncio
