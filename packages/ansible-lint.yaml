package: ansible-lint
repo: https://github.com/ansible/ansible-lint
pypi_url: https://pypi.org/project/ansible-lint/
extension_type: pure
python_versions: []
install_method: pip
install_command: git fetch --tags --depth 1 && pip install -e . && pip install pytest pytest-mock pytest-xdist
test_command: python -m pytest test -p no:xdist
test_framework: pytest
uses_xdist: true
timeout: null
skip: false
skip_reason: null
skip_versions:
  '3.15': "ansible-core (required dep) does not support Python 3.15; also jsonschema>4.18 pulls rpds-py (PyO3)"
notes: "Uses setuptools-scm (needs git tags). xdist disabled for JIT testing"
enriched: true
clone_depth: 50
import_name: null
