package: psygnal
repo: https://github.com/pyapp-kit/psygnal
pypi_url: https://pypi.org/project/psygnal/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install anyio attrs msgspec numpy pytest pytest-asyncio pytest-randomly toolz trio wrapt
test_command: python -m pytest tests/ -p no:xdist --ignore=tests/test_qt_compat.py --ignore=tests/test_pyinstaller_hook.py
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions:
  '3.15': pydantic depends on pydantic-core (PyO3/maturin, won't build on 3.15)
notes: 'Exclude test_qt_compat.py (needs Qt system libs/pytestqt) and test_pyinstaller_hook.py (needs pyinstaller). pydantic/pydantic_core omitted: pydantic-core is PyO3 and blocks 3.15; pydantic tests skip when pydantic not installed. pytestqt/qtpy require Qt system installation.'
enriched: true
clone_depth: null
import_name: null
