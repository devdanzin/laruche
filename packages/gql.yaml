package: gql
repo: https://github.com/graphql-python/gql
pypi_url: https://pypi.org/project/gql/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install pytest pytest-asyncio graphql-core
test_command: python -m pytest tests/test_client.py tests/test_graphql_request.py
  tests/test_async_client_validation.py -o "asyncio_default_fixture_loop_scope=function"
test_framework: pytest
uses_xdist: false
timeout: 300
skip: false
skip_reason: null
skip_versions: {}
notes: "conftest.py imports pytest_asyncio at top level. Most tests require aiohttp,
  httpx, websockets, requests transports - only run client/validation tests that work
  without live server infrastructure. Transport-specific tests need full server fixtures."
enriched: true
clone_depth: null
import_name: null
