package: omegaconf
repo: https://github.com/omry/omegaconf
pypi_url: https://pypi.org/project/omegaconf/
extension_type: pure
python_versions: []
install_method: pip
install_command: pip install -e . && pip install "pytest<8.4" pyyaml attrs
test_command: python -m pytest tests/ -p no:xdist
test_framework: pytest
uses_xdist: false
timeout: 600
skip: false
skip_reason: null
skip_versions: {}
notes: 'Pure Python package (py3-none-any wheel). antlr4 is vendored internally — no external antlr4 dep needed. Tests import _pytest.python_api.RaisesContext which was removed in pytest 8.4, so pin pytest<8.4. attrs is used in structured_conf tests (attr_classes.py). PyYAML is a runtime dep. Removed incorrect 3.15 skip — omegaconf has no C extensions.'
enriched: true
clone_depth: null
import_name: null
